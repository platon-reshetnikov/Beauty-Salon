<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/Admin.css">
</head>
<body>
    <h1>Appointments</h1>
    <ul id="bookingList"></ul>

    <div id="editForm" style="display: none;">
        <h2>Edit Appointment</h2>
        <input type="hidden" id="editIndex">
        <label for="editClientName">Client Name:</label>
        <input type="text" id="editClientName" disabled>

        <label for="editClientPhone">Client Phone:</label>
        <input type="text" id="editClientPhone" disabled>

        <label for="editMaster">Master:</label>
        <select id="editMaster" required>
            <option value="Oleksandr (male master)">Oleksandr (male master)</option>
            <option value="Denys (male master)">Denys (male master)</option>
            <option value="Viktoria (female master)">Viktoria (female master)</option>
            <option value="Alisa (female master)">Alisa (female master)</option>
            <option value="Krys (female master)">Krys (female master)</option>
        </select>

        <label for="editService">Service:</label>
        <select id="editService" required>
            <option value="Haircut - 500 UAH">Haircut - 500 UAH</option>
            <option value="Beard & moustache trim - 600 UAH">Beard & moustache trim - 600 UAH</option>
            <option value="Evening & bridal hairstyles - 1800 UAH">Evening & bridal hairstyles - 1800 UAH</option>
            <option value="Hair colouring - 400 UAH">Hair colouring - 400 UAH</option>
            <option value="Hair perm - 400 UAH">Hair perm - 400 UAH</option>
            <option value="Hair restoration - 1000 UAH">Hair restoration - 1000 UAH</option>
            <option value="Pedicure: classic / hardware / SPA - 700/900/1100 UAH">Pedicure: classic / hardware / SPA - 700/900/1100 UAH</option>
            <option value="SPA hand & foot care - 1500 UAH">SPA hand & foot care - 1500 UAH</option>
            <option value="Gel-polish coating Shellac CND, Kodi - 1200 UAH">Gel-polish coating Shellac CND, Kodi - 1200 UAH</option>
            <option value="Nail extension & strengthening with gel - 1600 UAH">Nail extension & strengthening with gel - 1600 UAH</option>
            <option value="Makeup - 300-700 UAH">Makeup - 300-700 UAH</option>
            <option value="Visage - 250 UAH">Visage - 250 UAH</option>
        </select>

        <label for="editDate">Date:</label>
        <input type="date" id="editDate" required>

        <label for="editTime">Time:</label>
        <select id="editTime" required>
            <option value="" disabled selected>Select time</option>
            <option value="08:00">08:00</option>
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
        </select>

        <button id="updateButton">Save</button>
        <button id="cancelButton">Cancel</button>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
